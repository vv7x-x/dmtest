<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <meta name="app-root" content="..">
  <title>تم إنشاء الطلب — dm</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header id="mainHeader">
    <div class="header-container">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><img src="../assets/logo.png" alt="dm"></div>
        <div class="logo-text">dm<span>.</span></div>
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">الرئيسية</a></li>
        <li><a href="../account/orders.html" id="navAccount">طلباتي</a></li>
      </ul>
      <div class="header-actions"></div>
    </div>
  </header>

  <main class="confirm-page">
    <div class="confirm-card uiglass uiglass-strong">
      <div class="confirm-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h2>تم إنشاء طلبك بنجاح!</h2>
      <p>شكراً لتسوقك من dm. سيتواصل معك فريقنا قريباً لتأكيد الشحن.</p>
      <p class="confirm-order-id" id="orderIdDisplay">—</p>
      <div class="confirm-actions">
        <a href="../index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a href="../account/orders.html" class="btn btn-outline"><i class="fa-solid fa-box"></i> طلباتي</a>
      </div>

      <!-- WhatsApp Note -->
      <div class="checkout-whatsapp-note" style="margin-top:24px;text-align:right;direction:rtl;">
        <div class="whatsapp-note-icon"><i class="fa-brands fa-whatsapp"></i></div>
        <div class="whatsapp-note-text">
          <p>🎁 عايز تستعجل توصيل طلبك؟ أو تبعت كتاب كهدية (جيفت) لحد؟</p>
          <p>تواصل معنا عالواتساب عشان نجهز طلبك بسرعة</p>
          <a href="https://wa.me/201559215694" target="_blank" class="whatsapp-note-btn"><i class="fa-brands fa-whatsapp"></i> تواصل عبر واتساب</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    var orderId = params.get('o');
    if (orderId && window.dmCrypto) {
      orderId = dmCrypto.decryptParam(orderId);
    }
    if (!orderId) orderId = params.get('order');
    const el = document.getElementById('orderIdDisplay');
    if (orderId && el) {
      el.textContent = 'رقم الطلب: ' + orderId;
    } else if (el) {
      el.textContent = 'تم تسجيل طلبك.';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/crypto-utils.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
