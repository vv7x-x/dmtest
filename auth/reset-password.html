<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <meta name="app-root" content="..">
  <title>استعادة كلمة المرور — dm</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
  <main class="auth-page">
    <div class="auth-shell">
      <a class="auth-back" href="login.html"><i class="fa-solid fa-arrow-right"></i> العودة لتسجيل الدخول</a>

      <div class="auth-brand">
        <img src="../assets/logo.png" alt="dm bookstore" width="96" height="96">
        <h1>dm<span style="color:var(--brand-gold)">.</span></h1>
        <p>سنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>
      </div>

      <div class="auth-card uiglass uiglass-strong">
        <h2>استعادة كلمة المرور</h2>
        <div id="authMessage" class="auth-message" hidden></div>
        <form id="resetForm" onsubmit="authSendReset(event)" novalidate>
          <label for="resetEmail">البريد الإلكتروني</label>
          <input id="resetEmail" type="email" required autocomplete="email" placeholder="أدخل بريدك المسجّل">

          <div class="auth-actions">
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-envelope"></i> إرسال الرابط</button>
          </div>
        </form>
        <p class="auth-note"><a href="login.html">العودة لتسجيل الدخول</a></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/crypto-utils.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
