<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <title>حسابي — dm</title>
  <meta name="app-root" content="..">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="mainHeader">
    <div class="header-container">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><img src="../assets/logo.png" alt="dm"></div>
        <div class="logo-text">dm<span>.</span></div>
      </a>

      <ul class="nav-links">
        <li><a href="../index.html" id="navHome">الرئيسية</a></li>
        <li><a href="../catalog.html" id="navCatalog">كتالوج الكتب</a></li>
        <li><a href="../contact.html" id="navContact">تواصل معنا</a></li>
        <li><a href="../auth/login.html" id="navLogin">تسجيل دخول</a></li>
        <li><a href="../auth/register.html" id="navRegister">تسجيل جديد</a></li>
        <li><a href="profile.html" id="navAccount">حسابي</a></li>
      </ul>

      <div class="header-actions"></div>
    </div>
  </header>

  <div id="app-content">
  <main class="container">
    <h2>حسابي</h2>
    <div id="profileCard" class="profile-card uiglass">
      <div class="profile-row">
        <div class="profile-avatar" aria-hidden="true"><i class="fa-solid fa-user"></i></div>
        <div class="profile-fields">
          <p style="margin-bottom:6px; color:var(--ink-muted);">البريد الالكتروني</p>
          <p style="font-weight:800; margin-bottom:12px;"><span id="profileEmail">-</span></p>
          <label for="profileName" style="font-weight:700; color:var(--ink-muted);">الاسم الكامل</label>
          <input id="profileName" placeholder="الاسم الكامل">
        </div>
      </div>
      <div style="margin-top:18px; display:flex; gap:12px;">
        <button class="btn btn-primary" onclick="updateProfile()">تحديث الملف</button>
        <a class="btn btn-outline" href="orders.html">عرض الطلبات</a>
        <button class="btn btn-secondary" onclick="authSignOut()">تسجيل خروج</button>
      </div>
    </div>
  </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/crypto-utils.js"></script>
  <script src="../js/security.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
