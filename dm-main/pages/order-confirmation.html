<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="app-root" content="..">
  <title>تم إنشاء الطلب — dm</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../../assets/logo.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://vjibucksajumamngxcku.supabase.co 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; img-src 'self' https://vjibucksajumamngxcku.supabase.co data: blob:; connect-src 'self' https://vjibucksajumamngxcku.supabase.co wss://vjibucksajumamngxcku.supabase.co https://cdn.jsdelivr.net; font-src 'self' https://cdnjs.cloudflare.com data:; form-action 'self'; base-uri 'self';">
</head>
<body>
  <header id="mainHeader">
    <div class="header-container">
      <a href="../index.html" class="logo">
        <div class="logo-icon"><img src="../assets/logo.png" alt="dm"></div>
        <div class="logo-text">dm<span>.</span></div>
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">الرئيسية</a></li>
        <li><a href="../account/orders.html" id="navAccount">طلباتي</a></li>
      </ul>
      <div class="header-actions"></div>
    </div>
  </header>

  <main class="confirm-page">
    <div class="confirm-card uiglass uiglass-strong">
      <div class="confirm-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h2>تم إنشاء طلبك بنجاح!</h2>
      <p>شكراً لتسوقك من dm. سيتواصل معك فريقنا قريباً لتأكيد الشحن.</p>
      <p class="confirm-order-id" id="orderIdDisplay">—</p>
      <div class="confirm-actions">
        <a href="../index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a href="../account/orders.html" class="btn btn-outline"><i class="fa-solid fa-box"></i> طلباتي</a>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('order');
    const el = document.getElementById('orderIdDisplay');
    if (orderId && el) {
      el.textContent = 'رقم الطلب: ' + orderId;
    } else if (el) {
      el.textContent = 'تم تسجيل طلبك.';
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
